name: DevSecOps Go Pipeline

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        default: '1.22'
        required: false
      image-name:
        type: string
        required: true
      registry:
        type: string
        default: 'ghcr.io'
        required: false
      build-args:
        type: string
        default: ''
        required: false
      release-name:
        type: string
        required: true
      chart-path:
        type: string
        required: true
      dev-namespace:
        type: string
        default: 'dev'
        required: false
      preprod-namespace:
        type: string
        default: 'preprod'
        required: false
      prod-namespace:
        type: string
        default: 'prod'
        required: false
      deploy-runs-on:
        type: string
        default: '["self-hosted", "home-k8s"]'
        required: false
      sonar-enabled:
        type: boolean
        default: false
        required: false
    secrets:
      sonar-token:
        required: false
      sonar-project-key:
        required: false
      sonar-host-url:
        required: false

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./Dockerfile
          ignore: DL3008,DL3018

  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  unit-tests:
    runs-on: ubuntu-latest
    needs: [hadolint, secret-detection, dependency-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - name: Run tests with coverage
        run: go test -v -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  sonarqube:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ inputs.sonar-enabled }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.sonar-token }}
          SONAR_HOST_URL: ${{ secrets.sonar-host-url }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.sonar-project-key }}
            -Dsonar.projectName=${{ secrets.sonar-project-key }}
            -Dsonar.go.coverage.reportPaths=coverage.out

  compile:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
      - name: Build Go binary
        run: go build -v -o app .
      - name: Upload Go Binary
        uses: actions/upload-artifact@v4
        with:
          name: go-binary
          path: app

  build-and-push:
    runs-on: ubuntu-latest
    needs: compile
    outputs:
      image-tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Download Go Binary
        uses: actions/download-artifact@v4
        with:
          name: go-binary
      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image locally for Scan
        run: |
          docker build -t ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.vars.outputs.sha_short }} .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.vars.outputs.sha_short }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Docker Image
        run: |
          docker tag ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.vars.outputs.sha_short }} ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
          docker push ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.vars.outputs.sha_short }}
          docker push ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}:latest

  deploy-dev:
    runs-on: ${{ fromJSON(inputs.deploy-runs-on) }}
    needs: build-and-push
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Deploy to K8s via Helm (Dev)
        run: |
          helm upgrade --install ${{ inputs.release-name }} ${{ inputs.chart-path }} \
            --namespace ${{ inputs.dev-namespace }} \
            --create-namespace \
            --set image.repository=${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }} \
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }}

  deploy-preprod:
    runs-on: ${{ fromJSON(inputs.deploy-runs-on) }}
    needs: build-and-push
    environment: preprod
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Deploy to K8s via Helm (Preprod)
        run: |
          helm upgrade --install ${{ inputs.release-name }} ${{ inputs.chart-path }} \
            --namespace ${{ inputs.preprod-namespace }} \
            --create-namespace \
            --set image.repository=${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }} \
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }}

  deploy-prod:
    runs-on: ${{ fromJSON(inputs.deploy-runs-on) }}
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Deploy to K8s via Helm (Prod)
        run: |
          helm upgrade --install ${{ inputs.release-name }} ${{ inputs.chart-path }} \
            --namespace ${{ inputs.prod-namespace }} \
            --create-namespace \
            --set image.repository=${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }} \
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }}
