name: Java Unified Pipeline

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '17'
        required: false
      build-tool:
        type: string
        default: 'maven'
        required: false
      image-name:
        type: string
        required: true
      registry:
        type: string
        default: 'ghcr.io'
        required: false
      build-args:
        type: string
        default: ''
        required: false
      release-name:
        type: string
        required: true
      chart-path:
        type: string
        required: true
      namespace:
        type: string
        default: 'default'
        required: false
      deploy-runs-on:
        type: string
        default: '["self-hosted", "home-k8s"]'
        required: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: ${{ inputs.build-tool }}

      - name: Build and Test with Maven
        if: inputs.build-tool == 'maven'
        run: mvn clean test

      - name: Build and Test with Gradle
        if: inputs.build-tool == 'gradle'
        run: ./gradlew test

  build-and-push:
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image-tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
            ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.vars.outputs.sha_short }}
          build-args: |
            VERSION=${{ steps.vars.outputs.sha_short }}
            ${{ inputs.build-args }}

  deploy:
    runs-on: ${{ fromJSON(inputs.deploy-runs-on) }}
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to K8s via Helm
        run: |
          helm upgrade --install ${{ inputs.release-name }} ${{ inputs.chart-path }} \
            --namespace ${{ inputs.namespace }} \
            --create-namespace \
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }}
